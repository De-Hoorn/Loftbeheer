<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141412">
<title>De Hoorn — Poetsbeheer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   DE HOORN — DESIGN TOKENS
══════════════════════════════════════════════ */
:root {
  --bg:      #141412;
  --sur:     #1e1c18;
  --sur2:    #252320;
  --sur3:    #2e2c28;
  --bdr:     #383530;
  --bdr2:    #4a4640;
  --gold:    #c8922a;
  --gold-l:  rgba(200,146,42,.13);
  --gold-d:  #a07220;
  --cream:   #f0ece4;
  --text:    #c8c0b0;
  --muted:   #706860;
  --grn:     #3a7a50;
  --grn-l:   rgba(58,122,80,.18);
  --red:     #c04030;
  --red-l:   rgba(192,64,48,.18);
  --blu:     #3878c0;
  --blu-l:   rgba(56,120,192,.15);
  --ora:     #d07820;
  --ora-l:   rgba(208,120,32,.15);
  --pur:     #7050a0;
  --pur-l:   rgba(112,80,160,.15);
  --sans:    'DM Sans', sans-serif;
  --disp:    'Syne', sans-serif;
  --r:       6px;
  --r2:      10px;
  --r3:      16px;
  /* Safe area insets for notched phones */
  --safe-t:  env(safe-area-inset-top, 0px);
  --safe-b:  env(safe-area-inset-bottom, 0px);
}

/* ══ RESET ══ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  background:var(--bg); color:var(--cream);
  font-family:var(--sans); font-size:14px;
  min-height:100%; -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
button { font-family:var(--sans); }
input, select, textarea { font-family:var(--sans); font-size:16px; /* prevent iOS zoom */ }

/* ══ LOADING SPLASH ══ */
#splash {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#splash.hidden { display:none; }
.splash-mark {
  width:64px; height:64px; background:var(--gold); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--disp); font-size:26px; font-weight:800; color:#fff;
  box-shadow:0 12px 40px rgba(200,146,42,.35);
  animation: splashPulse 1.4s ease-in-out infinite;
}
@keyframes splashPulse {
  0%,100% { box-shadow:0 12px 40px rgba(200,146,42,.35); }
  50%      { box-shadow:0 12px 60px rgba(200,146,42,.6); }
}
.splash-dots { display:flex; gap:6px; }
.splash-dot {
  width:6px; height:6px; border-radius:50%; background:var(--gold);
  animation: splashDot 1.2s ease-in-out infinite;
}
.splash-dot:nth-child(2) { animation-delay:.2s; }
.splash-dot:nth-child(3) { animation-delay:.4s; }
@keyframes splashDot {
  0%,100% { opacity:.2; transform:scale(.8); }
  50%     { opacity:1;  transform:scale(1.2); }
}

/* ══ SCREENS ══ */
.screen { display:none; }
.screen.active { display:flex; flex-direction:column; min-height:100dvh; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════ */
#s-login {
  align-items:center; justify-content:center; padding:24px 20px;
  padding-top:calc(24px + var(--safe-t));
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(200,146,42,.09) 0%, transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.018) 39px,rgba(255,255,255,.018) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.018) 39px,rgba(255,255,255,.018) 40px);
}
.login-box { width:100%; max-width:400px; }
.login-logo { text-align:center; margin-bottom:40px; }
.login-mark {
  width:60px; height:60px; background:var(--gold); border-radius:12px;
  display:inline-flex; align-items:center; justify-content:center;
  font-family:var(--disp); font-size:26px; font-weight:800; color:#fff;
  margin-bottom:14px; box-shadow:0 8px 32px rgba(200,146,42,.3);
}
.login-title { font-family:var(--disp); font-size:28px; font-weight:800; color:var(--cream); margin-bottom:4px; }
.login-sub   { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }

.login-step { display:none; }
.login-step.active { display:block; animation:fadeUp .22s ease; }
.ls-title { font-family:var(--disp); font-size:20px; font-weight:700; text-align:center; margin-bottom:4px; }
.ls-sub   { font-size:13px; color:var(--muted); text-align:center; margin-bottom:24px; }

/* Profile cards */
.profile-list { display:flex; flex-direction:column; gap:10px; }
.pcard {
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r2);
  padding:16px 18px; cursor:pointer; display:flex; align-items:center; gap:14px;
  transition:all .16s; user-select:none; min-height:68px;
}
.pcard:hover  { border-color:var(--gold); background:var(--sur2); }
.pcard:active { transform:scale(.98); background:var(--gold-l); border-color:var(--gold); }
.pav {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--disp); font-size:15px; font-weight:800; color:#fff; flex-shrink:0;
}
.pname { font-family:var(--disp); font-size:15px; font-weight:700; color:var(--cream); }
.prole { font-size:12px; color:var(--muted); margin-top:2px; }
.parr  { margin-left:auto; color:var(--muted); font-size:20px; }

/* PIN screen */
.pin-wrap  { display:flex; flex-direction:column; align-items:center; gap:24px; }
.pin-dots  { display:flex; gap:14px; }
.pin-dot   { width:16px; height:16px; border-radius:50%; border:2px solid var(--bdr2); background:transparent; transition:all .12s; }
.pin-dot.filled { background:var(--gold); border-color:var(--gold); }
.pin-dot.error  { background:var(--red);  border-color:var(--red); }
.pin-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:260px; }
.pin-btn   {
  background:var(--sur2); border:1px solid var(--bdr); border-radius:var(--r2);
  padding:18px; font-size:22px; font-family:var(--disp); font-weight:700; color:var(--cream);
  cursor:pointer; transition:all .1s; user-select:none; min-height:64px;
}
.pin-btn:hover  { background:var(--sur3); border-color:var(--bdr2); }
.pin-btn:active { transform:scale(.91); background:var(--gold-l); border-color:var(--gold); }

.btn-back {
  display:flex; align-items:center; gap:6px; background:none; border:none;
  color:var(--muted); font-size:13px; cursor:pointer; margin-bottom:22px;
  transition:color .14s; min-height:44px;
}
.btn-back:hover { color:var(--cream); }

/* ══════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════ */
#s-app { flex-direction:column; }

/* ── TOPBAR (mobile) ── */
.topbar {
  height:56px; display:flex; align-items:center; gap:12px;
  padding:0 16px; padding-top:var(--safe-t);
  background:var(--sur); border-bottom:1px solid var(--bdr);
  position:sticky; top:0; z-index:100; flex-shrink:0;
}
.topbar-title { font-family:var(--disp); font-size:16px; font-weight:700; color:var(--cream); flex:1; }
.hamburger    { background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; padding:8px; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }

/* ── SIDEBAR ── */
.sb {
  width:240px; background:var(--sur); border-right:1px solid var(--bdr);
  height:100dvh; display:flex; flex-direction:column;
  position:fixed; top:0; left:0; z-index:300;
  transform:translateX(-100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sb.open { transform:translateX(0); }
.sb-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.65); z-index:299; backdrop-filter:blur(3px);
}
.sb-overlay.open { display:block; }
.sb-top    { padding:calc(18px + var(--safe-t)) 18px 14px; border-bottom:1px solid var(--bdr); }
.sb-brand  { display:flex; align-items:center; gap:12px; }
.sb-mark   { width:34px; height:34px; background:var(--gold); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-size:13px; font-weight:800; color:#fff; flex-shrink:0; }
.sb-brand-name { font-family:var(--disp); font-size:15px; font-weight:700; color:var(--cream); }
.sb-brand-sub  { font-size:10px; color:var(--muted); margin-top:1px; }
.sb-nav    { flex:1; padding:10px 0; overflow-y:auto; }
.sb-item   {
  display:flex; align-items:center; gap:12px; padding:14px 18px;
  color:var(--text); font-size:14px; cursor:pointer;
  transition:all .14s; border-left:3px solid transparent; user-select:none; min-height:52px;
}
.sb-item:hover  { background:var(--sur2); color:var(--cream); }
.sb-item.active { background:var(--gold-l); color:var(--gold); border-left-color:var(--gold); }
.sb-ico  { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
.sb-lbl  { flex:1; }
.sb-bdg  { background:var(--red); color:#fff; border-radius:10px; font-size:10px; font-weight:700; padding:2px 7px; min-width:20px; text-align:center; }
.sb-foot { padding:14px 18px calc(14px + var(--safe-b)); border-top:1px solid var(--bdr); margin-top:auto; }
.sb-user { display:flex; align-items:center; gap:10px; }
.sb-av   { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-size:12px; font-weight:800; color:#fff; flex-shrink:0; }
.sb-uname { font-size:13px; font-weight:600; color:var(--cream); }
.sb-urole { font-size:11px; color:var(--muted); margin-top:1px; }
.sb-out  { margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; transition:color .14s; padding:8px; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
.sb-out:hover { color:var(--red); }

/* ── CONTENT ── */
.content { padding:16px; padding-bottom:calc(16px + var(--safe-b)); flex:1; overflow-y:auto; }

/* ── PAGES ── */
.page { display:none; animation:fadeUp .2s ease; }
.page.active { display:block; }

/* ══════════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════════ */

/* Cards */
.card { background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r2); overflow:hidden; margin-bottom:16px; }
.card-h { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--bdr); flex-wrap:wrap; gap:8px; }
.card-t { font-family:var(--disp); font-size:14px; font-weight:700; color:var(--cream); }
.card-b { padding:16px; }

/* Buttons */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 18px; border-radius:var(--r); border:1px solid transparent;
  font-size:14px; font-weight:500; cursor:pointer;
  transition:all .14s; white-space:nowrap; user-select:none;
  min-height:44px;
}
.btn:active { transform:scale(.97); }
.btn-gold   { background:var(--gold);   color:#fff;        border-color:var(--gold); }
.btn-gold:hover  { background:var(--gold-d); border-color:var(--gold-d); }
.btn-ghost  { background:transparent;  color:var(--text); border-color:var(--bdr); }
.btn-ghost:hover { background:var(--sur2); color:var(--cream); border-color:var(--bdr2); }
.btn-danger { background:var(--red-l); color:var(--red);  border-color:rgba(192,64,48,.3); }
.btn-danger:hover { background:rgba(192,64,48,.28); }
.btn-grn    { background:var(--grn-l); color:var(--grn);  border-color:rgba(58,122,80,.3); }
.btn-grn:hover { background:rgba(58,122,80,.28); }
.btn-sm     { padding:7px 14px; font-size:13px; min-height:38px; }
.btn-xs     { padding:5px 10px; font-size:11px; min-height:32px; }
.btn-full   { width:100%; }

/* Form fields */
.fld { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.fld label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.fld input, .fld select, .fld textarea {
  background:var(--sur2); border:1px solid var(--bdr); border-radius:var(--r);
  color:var(--cream); padding:12px 14px; transition:border-color .14s;
  min-height:48px;
}
.fld input:focus, .fld select:focus, .fld textarea:focus { outline:none; border-color:var(--gold); }
.fld select option { background:var(--sur2); }
.fld textarea { resize:vertical; min-height:80px; font-size:14px; }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-grn   { background:var(--grn-l); color:var(--grn); }
.badge-red   { background:var(--red-l); color:var(--red); }
.badge-ora   { background:var(--ora-l); color:var(--ora); }
.badge-blu   { background:var(--blu-l); color:var(--blu); }
.badge-pur   { background:var(--pur-l); color:var(--pur); }
.badge-muted { background:rgba(255,255,255,.05); color:var(--muted); }

/* ══════════════════════════════════════════════
   LOFT STATUS PAGE
══════════════════════════════════════════════ */
.verd-label {
  font-family:var(--disp); font-size:11px; font-weight:700;
  color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
  padding:6px 0 4px; margin-top:8px;
}
.loft-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
.loft-card {
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r2);
  padding:16px 14px; transition:border-color .15s;
}
.loft-card.bezet      { border-color:rgba(56,120,192,.5); background:rgba(56,120,192,.07); }
.loft-card.leeg-schoon { border-color:rgba(58,122,80,.5);  background:rgba(58,122,80,.07); }
.loft-card.leeg-vuil  { border-color:rgba(192,64,48,.5);  background:rgba(192,64,48,.07); }
.loft-card.clickable  { cursor:pointer; }
.loft-card.clickable:active { transform:scale(.97); }
.loft-num  { font-family:var(--disp); font-size:22px; font-weight:800; color:var(--cream); margin-bottom:2px; }
.loft-type { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; }
.loft-status-lbl { font-size:13px; font-weight:600; }
.loft-meta { font-size:11px; color:var(--muted); margin-top:4px; }
.loft-card.bezet       .loft-status-lbl { color:var(--blu); }
.loft-card.leeg-schoon .loft-status-lbl { color:var(--grn); }
.loft-card.leeg-vuil   .loft-status-lbl { color:var(--red); }

/* ══════════════════════════════════════════════
   TAKEN PAGE — MOBILE FIRST
══════════════════════════════════════════════ */
.week-nav {
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r2);
  padding:8px 12px;
}
.week-lbl { font-family:var(--disp); font-size:13px; font-weight:700; color:var(--cream); flex:1; text-align:center; }
.week-btn {
  background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer;
  min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center;
  border-radius:var(--r); transition:all .12s;
}
.week-btn:hover  { background:var(--sur2); color:var(--cream); }
.week-btn:active { background:var(--gold-l); color:var(--gold); }
.week-today-btn {
  font-size:11px; font-weight:600; color:var(--muted); background:var(--sur2);
  border:1px solid var(--bdr); border-radius:var(--r); padding:4px 10px;
  cursor:pointer; transition:all .12s; white-space:nowrap; min-height:32px;
}
.week-today-btn:active { background:var(--gold-l); color:var(--gold); border-color:var(--gold); }

.fbar { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.fbar::-webkit-scrollbar { display:none; }
.fb {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:500;
  border:1px solid var(--bdr); background:var(--sur); color:var(--text);
  cursor:pointer; transition:all .14s; user-select:none; flex-shrink:0;
  min-height:38px; white-space:nowrap;
}
.fb:active { transform:scale(.96); }
.fb.active { background:var(--gold-l); color:var(--gold); border-color:rgba(200,146,42,.4); }

/* Taak kaart — touch friendly */
.day-divider {
  font-family:var(--disp); font-size:11px; font-weight:700; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase; padding:12px 0 6px;
  display:flex; align-items:center; gap:10px;
}
.day-divider::after { content:''; flex:1; height:1px; background:var(--bdr); }
.day-divider.today { color:var(--gold); }
.day-divider.today::after { background:var(--gold-l); }

.taak {
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r2);
  margin-bottom:8px; overflow:hidden; transition:border-color .14s;
}
.taak.klaar { opacity:.55; }
.taak-main  { display:flex; align-items:stretch; gap:0; }

/* Big swipe-friendly check area */
.taak-check-zone {
  width:60px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  cursor:pointer; background:var(--sur2); border-right:1px solid var(--bdr);
  transition:all .14s; user-select:none;
}
.taak-check-zone:hover  { background:var(--grn-l); }
.taak-check-zone:active { background:var(--grn);   }
.taak.klaar .taak-check-zone { background:var(--grn-l); }

.taak-checkmark {
  width:28px; height:28px; border-radius:50%; border:2px solid var(--bdr2);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:transparent; transition:all .14s;
}
.taak.klaar .taak-checkmark { background:var(--grn); border-color:var(--grn); color:#fff; }

.taak-body  { flex:1; padding:14px; cursor:pointer; min-width:0; }
.taak-body:active { background:var(--sur2); }
.taak-loft  { font-family:var(--disp); font-size:18px; font-weight:800; color:var(--cream); margin-bottom:2px; }
.taak-gast  { font-size:12px; color:var(--muted); margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.taak.klaar .taak-loft { text-decoration:line-through; color:var(--muted); }
.taak-badges { display:flex; flex-wrap:wrap; gap:5px; }
.taak-klaar-door { font-size:11px; color:var(--grn); margin-top:6px; }

/* ══════════════════════════════════════════════
   BEZETTING ROOSTER
══════════════════════════════════════════════ */
.rooster-nav {
  display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap;
}
.rooster-lbl { font-family:var(--disp); font-size:13px; font-weight:700; color:var(--cream); flex:1; }
.rooster-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:0 0 var(--r2) var(--r2); }
.rooster { border-collapse:collapse; white-space:nowrap; font-size:11px; width:100%; }
.rooster th {
  background:var(--sur2); border:1px solid var(--bdr);
  padding:6px 6px; font-size:10px; font-weight:600; color:var(--muted);
  text-align:center; min-width:34px;
}
.rooster th.loft-col { min-width:54px; text-align:left; position:sticky; left:0; z-index:2; background:var(--sur2); padding-left:10px; }
.rooster td { border:1px solid var(--bdr); height:34px; text-align:center; vertical-align:middle; font-size:10px; }
.rooster td.loft-col {
  background:var(--sur); font-family:var(--disp); font-size:11px; font-weight:700;
  padding:0 10px; color:var(--cream); position:sticky; left:0; z-index:1;
}
.rooster th.day-today { background:var(--gold-l) !important; color:var(--gold) !important; }
.rooster td.day-today { background:rgba(200,146,42,.04) !important; }
.rc-booked  { background:var(--blu-l);  cursor:pointer; }
.rc-poets   { background:var(--pur-l); }
.rc-booked:hover { filter:brightness(1.4); }
.rc-we { opacity:.35; }

/* ══════════════════════════════════════════════
   TEAM PAGE
══════════════════════════════════════════════ */

<script type="module">

// ════════════════════════════════════════════════
// FIREBASE CONFIG
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyA-GhcwiYzv2po_n6wuqNRwdQP3sGTedLo",
  authDomain:        "loftbeheer-dehoorn.firebaseapp.com",
  databaseURL:       "https://loftbeheer-dehoorn-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "loftbeheer-dehoorn",
  storageBucket:     "loftbeheer-dehoorn.firebasestorage.app",
  messagingSenderId: "696127801225",
  appId:             "1:696127801225:web:c11c7720a43542abb24358"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Offline persistence — werkt ook zonder internet, synct automatisch
try {
  await enableIndexedDbPersistence(db);
} catch(e) {
  // Tweede tab open of private browsing — ok, degradeert gracefully
}

// ════════════════════════════════════════════════
// CONSTANTEN
// ════════════════════════════════════════════════
const LOFTS = [
  {id:'9.1',  verd:9,  type:'regular'},
  {id:'9.2',  verd:9,  type:'regular'},
  {id:'9.3',  verd:9,  type:'extra',   extraKamer:true},
  {id:'9.4',  verd:9,  type:'regular'},
  {id:'9.5',  verd:9,  type:'regular'},
  {id:'10.1', verd:10, type:'premium'},
  {id:'10.2', verd:10, type:'extra',   extraKamer:true},
  {id:'10.3', verd:10, type:'regular'},
  {id:'10.4', verd:10, type:'premium'},
];

const AVATAR_COLORS = ['#c8922a','#3a7a50','#3060a0','#c04030','#7050a0','#3a8a8a','#8a5030','#506080'];

// ════════════════════════════════════════════════
// IN-MEMORY CACHE (gevuld door Firestore listeners)
// ════════════════════════════════════════════════
let cache = {
  team:       {},   // id → doc
  boekingen:  {},
  taken:      {},
  loftStatus: {},
};

let curUser   = null;
let curPage   = null;
let weekOffset    = 0;
let roosterOffset = 0;
let taakFilter    = 'all';
let editBoekingId = null;
let editTeamId    = null;
let loginTarget   = null;
let pinBuffer     = '';

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today()  { return new Date().toISOString().slice(0,10); }
function addDays(iso, n) {
  const d = new Date(iso+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10);
}
function daysBetween(a, b) {
  return Math.round((new Date(b+'T12:00:00') - new Date(a+'T12:00:00')) / 86400000);
}
function weekStart(iso) {
  const d = new Date(iso+'T12:00:00'); const dow = d.getDay()||7;
  d.setDate(d.getDate()-(dow-1)); return d.toISOString().slice(0,10);
}
function fmtDate(iso) {
  if (!iso) return '';
  const [,m,d] = iso.split('-'); return `${d}/${m}`;
}
function fmtDateLong(iso) {
  if (!iso) return '';
  return new Date(iso+'T12:00:00').toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'});
}
function initials(naam) { return naam.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function nearestWeekday(iso) {
  const d = new Date(iso+'T12:00:00'); const dow = d.getDay();
  if (dow===0) d.setDate(d.getDate()+1);
  if (dow===6) d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function berekenTussentijds(ci, co) {
  const dagen = daysBetween(ci, co);
  if (dagen < 14) return [];
  if (dagen <= 28) {
    const m = new Date(ci+'T12:00:00'); m.setDate(m.getDate()+Math.round(dagen/2));
    return [nearestWeekday(m.toISOString().slice(0,10))];
  }
  const res = []; let d = new Date(ci+'T12:00:00'); d.setDate(d.getDate()+14);
  const coD = new Date(co+'T12:00:00');
  while (d < coD) { res.push(nearestWeekday(d.toISOString().slice(0,10))); d.setDate(d.getDate()+14); }
  return res;
}
function isEigenaar() { return curUser?.rol === 'eigenaar'; }

function toast(msg, type='') {
  const tw = document.getElementById('twrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type==='err'?' err':type==='ok'?' ok':'');
  t.textContent = msg;
  tw.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (status==='syncing'?' syncing':status==='error'?' error':'');
  dot.title = status==='syncing'?'Synchroniseren…':status==='error'?'Geen verbinding':'Verbonden';
}

// ════════════════════════════════════════════════
// FIRESTORE — REALTIME LISTENERS
// ════════════════════════════════════════════════
let unsubscribers = [];

function startListeners() {
  // Verwijder oude listeners
  unsubscribers.forEach(u => u());
  unsubscribers = [];

  const cols = ['team','boekingen','taken','loftStatus'];
  cols.forEach(col => {
    const u = onSnapshot(collection(db, col),
      snap => {
        cache[col] = {};
        snap.forEach(d => { cache[col][d.id] = {id:d.id, ...d.data()}; });
        // Re-render actieve pagina
        if (curPage) render(curPage);
        if (col === 'team') renderLogin();
        setSyncStatus('ok');
      },
      err => {
        console.error(col, err);
        setSyncStatus('error');
      }
    );
    unsubscribers.push(u);
  });
}

function stopListeners() {
  unsubscribers.forEach(u => u());
  unsubscribers = [];
}

// ════════════════════════════════════════════════
// FIREBASE SEED — eerste keer initializeren
// ════════════════════════════════════════════════
async function seedIfEmpty() {
  // Check of er al team-data is
  const snap = await getDoc(doc(db, '_meta', 'init'));
  if (snap.exists()) return; // al geïnitialiseerd

  const batch = writeBatch(db);

  // Default team
  const ownerId = uid();
  const cleanerId = uid();
  batch.set(doc(db,'team',ownerId),    {naam:'Eigenaar',    rol:'eigenaar',    kleur:'#c8922a', pin:'1234'});
  batch.set(doc(db,'team',cleanerId),  {naam:'Schoonmaker', rol:'schoonmaker', kleur:'#3a7a50', pin:''});

  // Default loftStatus
  LOFTS.forEach(l => {
    batch.set(doc(db,'loftStatus',l.id), {status:'leeg-schoon'});
  });

  // Mark as initialized
  batch.set(doc(db,'_meta','init'), {ts: new Date().toISOString()});

  await batch.commit();
  toast('App geïnitialiseerd ✓', 'ok');
}

function renderLogin() {
  const list = document.getElementById('profileList');
  const team = Object.values(cache.team).filter(p => p.rol !== undefined);

  if (!team.length) {
    list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Laden…</div>`;
    return;
  }

  // Sort: eigenaar eerst, dan alfabetisch
  team.sort((a,b) => {
    if (a.rol==='eigenaar' && b.rol!=='eigenaar') return -1;
    if (b.rol==='eigenaar' && a.rol!=='eigenaar') return  1;
    return a.naam.localeCompare(b.naam);
  });

  list.innerHTML = team.map(p => `
    <div class="pcard" onclick="window._selectProfile('${p.id}')">
      <div class="pav" style="background:${p.kleur}">${initials(p.naam)}</div>
      <div>
        <div class="pname">${p.naam}</div>
        <div class="prole">${p.rol==='eigenaar'?'Eigenaar':'Schoonmaker'}</div>
      </div>
      <div class="parr">${p.pin ? '🔒' : '›'}</div>
    </div>
  `).join('');
}

window._selectProfile = function(id) {
  loginTarget = cache.team[id];
  if (!loginTarget) return;
  if (!loginTarget.pin) {
    curUser = loginTarget;
    startApp();
    return;
  }
  document.getElementById('ls2-name').textContent = loginTarget.naam;
  pinBuffer = '';
  renderPinDots();
  buildPinGrid();
  showLoginStep('ls-2');
};

function showLoginStep(id) {
  document.querySelectorAll('.login-step').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function loginBack() { pinBuffer=''; showLoginStep('ls-1'); }

function renderPinDots() {
  document.getElementById('pinDots').innerHTML =
    [0,1,2,3].map(i=>`<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`).join('');
}

function buildPinGrid() {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  document.getElementById('pinGrid').innerHTML = keys.map(k =>
    k==='' ? '<div></div>' : `<button class="pin-btn" onclick="window._pinKey('${k}')">${k}</button>`
  ).join('');
}

window._pinKey = function(k) {
  if (k==='⌫') { pinBuffer=pinBuffer.slice(0,-1); renderPinDots(); return; }
  if (pinBuffer.length>=4) return;
  pinBuffer+=k; renderPinDots();
  if (pinBuffer.length===4) setTimeout(checkPin, 120);
};

function checkPin() {
  if (pinBuffer === loginTarget.pin) {
    curUser = loginTarget; startApp();
  } else {
    document.querySelectorAll('.pin-dot').forEach(d=>{ d.classList.remove('filled'); d.classList.add('error'); });
    setTimeout(()=>{ pinBuffer=''; renderPinDots(); }, 800);
    toast('Verkeerde PIN', 'err');
  }
}

function logout() {
  curUser=null; curPage=null;
  showScreen('s-login');
  showLoginStep('ls-1');
}
window.logout        = logout;
window.loginBack     = loginBack;
window.weekNav       = weekNav;
window.setFilter     = setFilter;
window.roosterNav    = roosterNav;

function getLoftStatus(loftId) {
  const t = today();
  const boek = Object.values(cache.boekingen).find(b=>b.loftId===loftId && b.checkIn<=t && b.checkOut>t);
  if (boek) return {status:'bezet', boeking:boek};
  return {status: cache.loftStatus[loftId]?.status || 'leeg-vuil'};
}

function renderStatus() {
  const verds = [...new Set(LOFTS.map(l=>l.verd))].sort((a,b)=>a-b);
  document.getElementById('statusGrid').innerHTML = verds.map(v => {
    const lofts = LOFTS.filter(l=>l.verd===v);
    const typeTag = l => l.type==='premium'?'PREMIUM':l.extraKamer?'EXTRA KAMER':'REGULAR';
    return `
      <div class="verd-label">Verdieping ${v}</div>
      <div class="loft-grid">
        ${lofts.map(l => {
          const {status, boeking} = getLoftStatus(l.id);
          const canEdit = isEigenaar() && status !== 'bezet';
          const lbl = status==='bezet'?'🔵 Bezet':status==='leeg-schoon'?'🟢 Leeg – schoon':'🔴 Leeg – vuil';
          const meta = status==='bezet'&&boeking ? `Vertrek ${fmtDate(boeking.checkOut)}` : '';
          return `
            <div class="loft-card ${status}${canEdit?' clickable':''}"
              ${canEdit?`onclick="window._cycleLoftStatus('${l.id}')" title="Klik om status te wijzigen"`:''}>
              <div class="loft-num">Loft ${l.id}</div>
              <div class="loft-type">${typeTag(l)}</div>
              <div class="loft-status-lbl">${lbl}</div>
              ${meta?`<div class="loft-meta">${meta}</div>`:''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }).join('');
}

window._cycleLoftStatus = async function(loftId) {
  const cur = cache.loftStatus[loftId]?.status || 'leeg-vuil';
  const next = cur==='leeg-schoon'?'leeg-vuil':'leeg-schoon';
  setSyncStatus('syncing');
  try {
    await setDoc(doc(db,'loftStatus',loftId), {status:next});
    toast(`Loft ${loftId}: ${next==='leeg-schoon'?'schoon ✓':'vuil'}`, 'ok');
    await logAction(`Status loft ${loftId} → ${next}`);
  } catch(e) {
    toast('Fout bij opslaan', 'err'); setSyncStatus('error');
  }
};

function weekNav(dir) {
  if (dir===0) weekOffset=0; else weekOffset+=dir;
  renderTaken();
}

function setFilter(el, f) {
  taakFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTaken();
}

function renderTaken() {
  const t = today();
  const ws = addDays(weekStart(t), weekOffset*7);
  const we = addDays(ws, 6);
  document.getElementById('weekLbl').textContent = `${fmtDateLong(ws)} — ${fmtDateLong(we)}`;

  let taken = Object.values(cache.taken).filter(ta=>ta.datum>=ws && ta.datum<=we);
  if (taakFilter==='open')  taken = taken.filter(ta=>ta.status==='open');
  if (taakFilter==='klaar') taken = taken.filter(ta=>ta.status==='klaar');
  taken.sort((a,b)=>a.datum.localeCompare(b.datum)||a.loftId.localeCompare(b.loftId));

  const list = document.getElementById('takenList');
  if (!taken.length) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">✅</div><div class="empty-t">Geen taken</div><div class="empty-s">Geen poetstaken gepland voor<br>${fmtDateLong(ws)} – ${fmtDateLong(we)}</div></div>`;
    updateBadge(); return;
  }

  const perDag = {};
  taken.forEach(ta => { (perDag[ta.datum]=perDag[ta.datum]||[]).push(ta); });

  list.innerHTML = Object.keys(perDag).sort().map(dag => {
    const isToday = dag===today();
    return `
      <div class="day-divider${isToday?' today':''}">${fmtDateLong(dag)}${isToday?' · Vandaag':''}</div>
      ${perDag[dag].map(ta=>renderTaakCard(ta)).join('')}
    `;
  }).join('');
  updateBadge();
}

function renderTaakCard(ta) {
  const isKlaar = ta.status==='klaar';
  const isTuss  = ta.type==='tussentijds';
  return `
    <div class="taak${isKlaar?' klaar':''}" id="taak-${ta.id}">
      <div class="taak-main">
        <div class="taak-check-zone" onclick="window._toggleTaak('${ta.id}')" title="${isKlaar?'Zet terug open':'Markeer klaar'}">
          <div class="taak-checkmark">${isKlaar?'✓':''}</div>
        </div>
        <div class="taak-body" onclick="window._openTaakDetail('${ta.id}')">
          <div class="taak-loft">Loft ${ta.loftId}</div>
          <div class="taak-gast">${ta.gast||''}</div>

            ${isTuss

window._toggleTaak = async function(id) {
  const ta = cache.taken[id];
  if (!ta) return;
  const isKlaar = ta.status==='klaar';
  const update = isKlaar
    ? {status:'open', klaarOp:null, klaarDoor:null}
    : {status:'klaar', klaarOp:today(), klaarDoor:curUser?.naam||''};

  setSyncStatus('syncing');
  try {
    await updateDoc(doc(db,'taken',id), update);
    // Bij eindpoets klaar: loft status → schoon
    if (!isKlaar && ta.type==='eindpoets') {
      await setDoc(doc(db,'loftStatus',ta.loftId), {status:'leeg-schoon'});
    }
    if (!isKlaar) toast(`Loft ${ta.loftId} klaar ✓`, 'ok');
    await logAction(`Taak loft ${ta.loftId} → ${update.status} (${curUser?.naam})`);
  } catch(e) {
    toast('Fout bij opslaan', 'err'); setSyncStatus('error');
  }
};

// BEZETTING / ROOSTER
// ════════════════════════════════════════════════
function roosterNav(dir) {
  if (dir===0) roosterOffset=0; else roosterOffset+=dir;
  renderBezetting();
}

function renderBezetting() {
  const t = today();
  const ws = addDays(weekStart(t), roosterOffset*7);
  const days = Array.from({length:28}, (_,i) => addDays(ws,i));

  document.getElementById('roosterLbl').textContent =
    `${fmtDateLong(ws)} — ${fmtDateLong(days[27])}`;

  let html = `<table class="rooster"><thead><tr>
    <th class="loft-col">Loft</th>
    ${days.map(d => {
      const dd = new Date(d+'T12:00:00');
      const isTo = d===t;
      const isWe = dd.getDay()===0||dd.getDay()===6;
      const dayLbl = ['zo','ma','di','wo','do','vr','za'][dd.getDay()];
      return `<th class="${isTo?'day-today':''}${isWe?' rc-we':''}">${dayLbl}<br>${dd.getDate()}</th>`;
    }).join('')}
  </tr></thead><tbody>`;

  LOFTS.forEach(l => {
    html += `<tr><td class="loft-col">${l.id}</td>`;
    days.forEach(d => {
      const isTo = d===t;
      const bk = Object.values(cache.boekingen).find(b=>b.loftId===l.id && b.checkIn<=d && b.checkOut>d);
      if (bk) {
        const isCI = bk.checkIn===d;
        const hasTaak = Object.values(cache.taken).some(ta=>ta.bkId===bk.id && ta.datum===d && ta.status==='open');
        const cls = hasTaak ? 'rc-poets' : 'rc-booked';
        html += `<td class="${cls}${isTo?' day-today':''}" onclick="window._openBoeking('${bk.id}')" title="${bk.naam}: ${bk.checkIn}–${bk.checkOut}">${isCI?'▶':hasTaak?'🧹':''}</td>`;
      } else {
        const ep = Object.values(cache.taken).find(ta=>ta.loftId===l.id && ta.datum===d && ta.status==='open');
        html += `<td class="${ep?'rc-poets':''}${isTo?' day-today':''}">${ep?'🧹':''}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('roosterWrap').innerHTML = html;
}

window._openBoeking = function(id) {
  const bk = cache.boekingen[id];
  editBoekingId = id || null;
  document.getElementById('mBoeking-t').textContent = bk ? `Boeking – Loft ${bk.loftId}` : 'Nieuwe boeking';
  document.getElementById('bkDelBtn').style.display = bk ? 'inline-flex' : 'none';
  const sel = document.getElementById('bk-loft');
  sel.innerHTML = LOFTS.map(l=>`<option value="${l.id}"${bk?.loftId===l.id?' selected':''}>${l.id} (${l.type})</option>`).join('');
  document.getElementById('bk-naam').value = bk?.naam||'';
  document.getElementById('bk-in').value  = bk?.checkIn||'';
  document.getElementById('bk-out').value = bk?.checkOut||'';
  openModal('mBoeking');
};

window.saveBoeking = async function() {
  const loftId = document.getElementById('bk-loft').value;
  const naam   = document.getElementById('bk-naam').value.trim();
  const ci     = document.getElementById('bk-in').value;
  const co     = document.getElementById('bk-out').value;
  if (!naam||!ci||!co) { toast('Vul alle velden in','err'); return; }
  if (co<=ci) { toast('Check-out moet na check-in liggen','err'); return; }

  setSyncStatus('syncing');
  try {
    const id = editBoekingId || uid();
    const bk = {id, loftId, naam, checkIn:ci, checkOut:co};

    if (editBoekingId) {
      // Verwijder oude taken voor deze boeking
      const oudeTaken = Object.values(cache.taken).filter(ta=>ta.bkId===editBoekingId);
      const batch = writeBatch(db);
      oudeTaken.forEach(ta => batch.delete(doc(db,'taken',ta.id)));
      batch.set(doc(db,'boekingen',id), bk);
      await batch.commit();
    } else {
      await setDoc(doc(db,'boekingen',id), bk);
    }
    await generateTaken(bk);
    closeModal('mBoeking');
    toast('Boeking opgeslagen ✓','ok');
    await logAction(`Boeking loft ${loftId}: ${naam} (${ci}–${co})`);
  } catch(e) {
    toast('Fout bij opslaan','err'); setSyncStatus('error');
  }
};

window.deleteBoeking = async function() {
  if (!editBoekingId) return;
  if (!confirm('Boeking en bijhorende taken verwijderen?')) return;
  setSyncStatus('syncing');
  try {
    const oudeTaken = Object.values(cache.taken).filter(ta=>ta.bkId===editBoekingId);
    const batch = writeBatch(db);
    oudeTaken.forEach(ta => batch.delete(doc(db,'taken',ta.id)));
    batch.delete(doc(db,'boekingen',editBoekingId));
    await batch.commit();
    closeModal('mBoeking');
    toast('Boeking verwijderd','ok');
  } catch(e) {
    toast('Fout bij verwijderen','err'); setSyncStatus('error');
  }
};

async function generateTaken(bk) {
  const batch = writeBatch(db);
  const epId = uid();
  batch.set(doc(db,'taken',epId), {
    id:epId, type:'eindpoets', loftId:bk.loftId, bkId:bk.id,
    gast:bk.naam, datum:bk.checkOut, status:'open', klaarDoor:null, klaarOp:null
  });
  berekenTussentijds(bk.checkIn, bk.checkOut).forEach(datum => {
    const tid = uid();
    batch.set(doc(db,'taken',tid), {
      id:tid, type:'tussentijds', loftId:bk.loftId, bkId:bk.id,
      gast:bk.naam, datum, status:'open', klaarDoor:null, klaarOp:null
    });
  });
  await batch.commit();
}

// ════════════════════════════════════════════════
window.openBatchModal = function() {
  document.getElementById('batchBody').innerHTML='';
  addBatchRow(); addBatchRow(); addBatchRow();
  openModal('mBatch');
};
window.addBatchRow = addBatchRow;

function addBatchRow() {
  const tr = document.createElement('tr');
  const id = uid();
  tr.id = 'br-'+id;
  tr.innerHTML = `
    <td><select name="loft">${LOFTS.map(l=>`<option value="${l.id}">${l.id}</option>`).join('')}</select></td>
    <td><input type="text" name="naam" placeholder="Naam gast" autocomplete="off"></td>
    <td><input type="date" name="ci"></td>
    <td><input type="date" name="co"></td>
    <td><button class="batch-row-del" onclick="document.getElementById('br-${id}').remove()">✕</button></td>
  `;
  document.getElementById('batchBody').appendChild(tr);
}

window.saveBatch = async function() {
  const rows = document.querySelectorAll('#batchBody tr');
  let count=0, errors=0;
  const boekingen = [];
  rows.forEach(row => {
    const loftId = row.querySelector('[name=loft]')?.value;
    const naam   = row.querySelector('[name=naam]')?.value?.trim();
    const ci     = row.querySelector('[name=ci]')?.value;
    const co     = row.querySelector('[name=co]')?.value;
    if (!naam&&!ci&&!co) return;
    if (!naam||!ci||!co||co<=ci) { errors++; return; }
    boekingen.push({id:uid(), loftId, naam, checkIn:ci, checkOut:co});
    count++;
  });
  if (!count) { if (errors) toast(`${errors} rij(en) ongeldig`,'err'); return; }

  setSyncStatus('syncing');
  try {
    for (const bk of boekingen) {
      await setDoc(doc(db,'boekingen',bk.id), bk);
      await generateTaken(bk);
    }
    closeModal('mBatch');
    toast(`${count} boeking${count>1?'en':''} opgeslagen ✓`,'ok');
    await logAction(`Batch: ${count} boekingen toegevoegd`);
    if (errors) toast(`${errors} rij(en) overgeslagen`,'err');
  } catch(e) {
    toast('Fout bij opslaan','err'); setSyncStatus('error');
  }
};

// ════════════════════════════════════════════════
// TEAM BEHEER
// ════════════════════════════════════════════════
function renderTeam() {
  const team = Object.values(cache.team).filter(p=>p.rol)
    .sort((a,b)=>(a.rol==='eigenaar'?0:1)-(b.rol==='eigenaar'?0:1)||a.naam.localeCompare(b.naam));
  document.getElementById('teamList').innerHTML = team.map(p=>`
    <div class="team-card">
      <div class="tc-av" style="background:${p.kleur}">${initials(p.naam)}</div>
      <div class="tc-info">
        <div class="tc-name">${p.naam}</div>
        <div class="tc-role">${p.rol==='eigenaar'?'Eigenaar':'Schoonmaker'} ${p.pin?'· 🔒 PIN':'· geen PIN'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window._openTeamModal('${p.id}')">✏️</button>
    </div>
  `).join('');
}

window._openTeamModal = function(id) {
  editTeamId = id||null;
  const p = id ? cache.team[id] : null;
  document.getElementById('mTeam-t').textContent = p?'Bewerken':'Toevoegen';
  document.getElementById('tm-naam').value = p?.naam||'';
  document.getElementById('tm-rol').value  = p?.rol||'schoonmaker';
  document.getElementById('tm-pin').value  = p?.pin||'';
  document.getElementById('tmDelBtn').style.display = p&&p.id!==curUser?.id?'inline-flex':'none';
  const sel = p?.kleur||AVATAR_COLORS[0];
  document.getElementById('tm-kleur-grid').innerHTML = AVATAR_COLORS.map(c=>`
    <div onclick="window._selectKleur(this,'${c}')" data-kleur="${c}"
      style="width:36px;height:36px;border-radius:50%;background:${c};cursor:pointer;
             border:3px solid ${c===sel?'var(--cream)':'transparent'};transition:border-color .12s;
             min-width:36px;"></div>
  `).join('');
  openModal('mTeam');
};
window.openTeamModal = () => window._openTeamModal(null);

window._selectKleur = function(el, kleur) {
  document.querySelectorAll('#tm-kleur-grid > div').forEach(d=>{
    d.style.borderColor = d.dataset.kleur===kleur?'var(--cream)':'transparent';
  });
};

window.saveTeamlid = async function() {
  const naam  = document.getElementById('tm-naam').value.trim();
  const rol   = document.getElementById('tm-rol').value;
  const pin   = document.getElementById('tm-pin').value.trim();
  const kleurEl = document.querySelector('#tm-kleur-grid > div[style*="var(--cream)"]');
  const kleur = kleurEl?.dataset?.kleur || AVATAR_COLORS[0];
  if (!naam) { toast('Naam is verplicht','err'); return; }
  if (pin&&!/^\d{4}$/.test(pin)) { toast('PIN moet 4 cijfers zijn','err'); return; }
  setSyncStatus('syncing');
  try {
    const id = editTeamId || uid();
    await setDoc(doc(db,'team',id), {naam, rol, kleur, pin});
    closeModal('mTeam');
    toast('Opgeslagen ✓','ok');
  } catch(e) { toast('Fout bij opslaan','err'); setSyncStatus('error'); }
};

window.deleteTeamlid = async function() {
  if (!editTeamId) return;
  if (!confirm('Teamlid verwijderen?')) return;
  try {
    await deleteDoc(doc(db,'team',editTeamId));
    closeModal('mTeam');
    toast('Verwijderd','ok');
  } catch(e) { toast('Fout bij verwijderen','err'); }
};

// ════════════════════════════════════════════════
// ACTIVITY LOG
// ════════════════════════════════════════════════
async function logAction(msg) {
  try {
    await setDoc(doc(db,'log',uid()), {
      ts: new Date().toISOString(),
      user: curUser?.naam||'?',
      msg
    });
  } catch(e) { /* non-critical */ }
}

// ════════════════════════════════════════════════
// KEYBOARD SUPPORT (desktop PIN)
// ════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!document.getElementById('ls-2').classList.contains('active')) return;
  if (e.key>='0'&&e.key<='9') window._pinKey(e.key);
  if (e.key==='Backspace') window._pinKey('⌫');
});

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
(async function init() {
  try {
    await seedIfEmpty();
    startListeners();

    // Wacht even tot eerste data binnenkomt
    await new Promise(r => setTimeout(r, 1200));
    document.getElementById('splash').classList.add('hidden');
    showScreen('s-login');
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('splash').innerHTML = `
      <div style="text-align:center;padding:20px;color:var(--red)">
        <div style="font-size:24px;margin-bottom:10px">⚠️</div>
        <div style="font-family:var(--disp);font-weight:700;margin-bottom:6px">Verbindingsfout</div>
        <div style="font-size:12px;color:var(--muted)">Controleer je internetverbinding<br>en herlaad de pagina</div>
        <button onclick="location.reload()" style="margin-top:16px;background:var(--gold);color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-family:var(--sans);font-size:14px">Herladen</button>
      </div>
    `;
  }
})();

</script>
</body>
</html>
